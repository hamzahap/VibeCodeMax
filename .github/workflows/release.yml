name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack CLI tarball
        id: pack
        shell: bash
        run: |
          PACKAGE_FILE="$(npm pack | tail -n 1)"
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        shell: bash
        run: |
          sha256sum "${{ steps.pack.outputs.package_file }}" > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pack.outputs.package_file }}
            SHA256SUMS.txt
          generate_release_notes: true
